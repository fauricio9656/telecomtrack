<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{general/fragmentos :: head}"></head>

<body>

<header th:replace="~{general/fragmentos :: header}"></header>

<main class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 th:text="#{usuario.titulo.listado}"></h1>

        <a th:href="@{/usuario/nuevo}"
           class="btn btn-primary"
           th:text="#{usuario.accion.agregar}">
        </a>

    </div>

    <div class="table-responsive">

        <table class="table table-striped table-hover align-middle">

            <thead>
            <tr>
                <th th:text="#{campo.nombre}"></th>
                <th th:text="#{campo.correo}"></th>
                <th th:text="#{campo.rol}"></th>
                <th th:text="#{campo.activo}"></th>
                <th th:text="#{campo.acciones}"></th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="usuario : ${usuarios}">

                <td th:text="${usuario.nombre + ' ' + usuario.apellido}">
                </td>

                <td th:text="${usuario.correo}">
                </td>

                <td th:text="${usuario.rol}">
                </td>

                <td>
                    <span th:if="${usuario.activo}"
                          th:text="#{valor.si}">
                    </span>

                    <span th:unless="${usuario.activo}"
                          th:text="#{valor.no}">
                    </span>
                </td>

                <td>

                    <a th:href="@{/usuario/modificar/{idUsuario}
                       (idUsuario=${usuario.idUsuario})}"
                       class="btn btn-warning btn-sm"
                       th:text="#{accion.modificar}">
                    </a>

                    <button th:if="${usuario.activo}"
                            type="button"
                            class="btn btn-danger btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#modalDesactivarUsuario"
                            th:attr="data-bs-id=${usuario.idUsuario},
                                     data-bs-descripcion=${usuario.nombre + ' ' + usuario.apellido}"
                            th:text="#{accion.desactivar}">
                    </button>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <div th:replace="~{general/fragmentos :: confirmarDesactivarUsuario}">
    </div>

</main>

<footer th:replace="~{general/fragmentos :: footer}"></footer>

<div th:replace="~{general/fragmentos :: scripts}"></div>

</body>
</html>
