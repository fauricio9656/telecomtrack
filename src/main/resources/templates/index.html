<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"></head>
<body class="bg-light">
<header th:replace="~{general/fragmentos :: header}"></header>
<main class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">
            <i class="fa-solid fa-tower-broadcast me-2"></i>TelecomTrack
        </h1>
        <p class="lead text-muted">Sistema de inventario de herramientas y materiales</p>
    </div>
    <div class="row g-4 justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm h-100 border-0">
                <div class="card-body text-center p-4">
                    <div class="mb-3 text-primary">
                        <i class="fa-solid fa-boxes-stacked fa-3x"></i>
                    </div>
                    <h5 class="card-title fw-bold">Materiales</h5>
                    <p class="card-text text-muted">Gestion del catalogo de materiales y control de stock minimo.</p>
                    <a th:href="@{/materiales}" class="btn btn-primary">
                        <i class="fa-solid fa-arrow-right me-1"></i>Ir a materiales
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
<div th:replace="~{general/fragmentos :: scripts}"></div>
</body>
</html>
