<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{general/fragmentos :: head}"></head>

<body>

<header th:replace="~{general/fragmentos :: header}"></header>

<main class="container py-5">

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title"
                        th:text="#{herramienta.titulo.listado}">
                    </h5>
                    <a th:href="@{/herramienta/listado}"
                       class="btn btn-primary"
                       th:text="#{herramienta.accion.consultar}">
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title"
                        th:text="#{herramienta.titulo.catalogo}">
                    </h5>
                    <a th:href="@{/herramienta/catalogo}"
                       class="btn btn-outline-primary"
                       th:text="#{herramienta.accion.consultar}">
                    </a>
                </div>
            </div>
        </div>

    </div>

</main>

<footer th:replace="~{general/fragmentos :: footer}"></footer>

<div th:replace="~{general/fragmentos :: scripts}"></div>

</body>
</html>
