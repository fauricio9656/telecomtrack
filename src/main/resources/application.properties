# Nombre de la aplicación
spring.application.name=telecomtrack

# Puerto donde escucha el servidor
server.port=80

# Formato de fecha y hora en el log
logging.pattern.dateformat=hh:mm

# Ocultar el banner de Spring
spring.main.banner-mode=off

# Evitar caché de Thymeleaf durante el desarrollo
spring.thymeleaf.cache=false

# Conexión a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/telecomtrack
spring.datasource.username=USUARIO_MYSQL
spring.datasource.password=CONTRASENA_MYSQL

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Mostrar consultas SQL en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE